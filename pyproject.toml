[project]
name = "countbeans"
version = "0.1.0"
description = "Telegram bot for managing and splitting expenses within Telegram groups"
authors = [{ name = "Daniel Ong", email = "ongfishh@gmail.com" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.135.2",
    "pydantic-settings>=2.8.1",
    "uvicorn>=0.34.0",
    "sqlalchemy>=2.0.40",
    "asyncpg>=0.30.0",
    "alembic>=1.15.2",
    "python-telegram-bot>=22.0",
    "telethon>=1.39.0",
    "deepagents>=0.4.12",
]

[tool.uv]
package = true

[tool.uv.sources]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/countbeans"]
