# Shared so the bot and the one-off migrate step never drift apart.
x-database-url: &database-url postgresql+asyncpg://countbeans:countbeans@db:5432/countbeans

x-app: &app
  build: .
  env_file: .env
  depends_on:
    db:
      condition: service_healthy

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: countbeans
      POSTGRES_USER: countbeans
      POSTGRES_PASSWORD: countbeans
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U countbeans"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    <<: *app
    restart: unless-stopped
    environment:
      COUNTBEANS_DATABASE_URL: *database-url
      COUNTBEANS_LOG_FORMAT: json

  # One-off migration step. Behind a profile so `docker compose up` never runs
  # it — apply migrations explicitly before deploying the bot:
  #   docker compose run --rm migrate
  migrate:
    <<: *app
    profiles: ["migrate"]
    environment:
      COUNTBEANS_DATABASE_URL: *database-url
    command: ["uv", "run", "alembic", "upgrade", "head"]

volumes:
  db_data:
