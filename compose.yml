# Shared so the bot and the one-off migrate step never drift apart. Credentials
# default to the dev values but can be OVERRIDDEN via the environment (or .env)
# for a real deployment — keep production secrets out of this committed file
# (see .env.example). The bot only reads the assembled DSN; pydantic-settings
# doesn't care where the value originates.
x-database-url: &database-url postgresql+asyncpg://${POSTGRES_USER:-countbeans}:${POSTGRES_PASSWORD:-countbeans}@db:5432/${POSTGRES_DB:-countbeans}

x-app: &app
  build: .
  env_file: .env
  depends_on:
    db:
      condition: service_healthy

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-countbeans}
      POSTGRES_USER: ${POSTGRES_USER:-countbeans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-countbeans}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-countbeans}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    <<: *app
    restart: unless-stopped
    environment:
      COUNTBEANS_DATABASE_URL: *database-url

  # One-off migration step. Behind a profile so `docker compose up` never runs
  # it — apply migrations explicitly before deploying the bot:
  #   docker compose run --rm migrate
  migrate:
    <<: *app
    profiles: ["migrate"]
    environment:
      COUNTBEANS_DATABASE_URL: *database-url
    command: ["uv", "run", "alembic", "upgrade", "head"]

  # Ephemeral Postgres for the test suite — tmpfs (no volume), wiped on teardown.
  # Profile-gated so a plain `docker compose up` never starts it.
  test-db:
    image: postgres:17-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: countbeans
      POSTGRES_USER: countbeans
      POSTGRES_PASSWORD: countbeans
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U countbeans"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Runs the integration suite inside the Compose network, reaching test-db
  # directly (no host port-forwarding). Source/tests are bind-mounted, so no
  # rebuild on change. On-demand:  docker compose --profile test run --rm test
  test:
    build:
      context: .
      target: test
    profiles: ["test"]
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://countbeans:countbeans@test-db:5432/countbeans
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: ["uv", "run", "--no-sync", "pytest", "tests/integrations"]

volumes:
  db_data:
